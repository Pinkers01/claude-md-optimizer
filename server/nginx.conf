# CLAUDE.md Optimizer · nginx snippet
# Append to /etc/nginx/sites-available/stopmetzoeken.store inside the server { } block.
# Then: cp /etc/nginx/sites-available/stopmetzoeken.store /etc/nginx/sites-enabled/stopmetzoeken.store
#       nginx -t && systemctl reload nginx
#
# Per CLAUDE.md HOSTING ARCHITECTURE: this app is on Hetzner VPS pinky-vps because
# it requires PM2 daemon + SQLite + outbound SMTP + Mollie webhook = SaaS.

# API (proxied to Node on :3280)
location /apps/optimizer/api/ {
    proxy_pass         http://127.0.0.1:3280;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # Mollie webhook + download stream both need slightly larger buffers.
    proxy_buffering    off;
    client_max_body_size 1m;
}

# Healthcheck (no proxy buffering, fast timeout — for fleet beacon polling)
location = /apps/optimizer/healthz {
    proxy_pass         http://127.0.0.1:3280;
    proxy_set_header   Host $host;
    proxy_read_timeout 5s;
    access_log         off;
}

# Landing + standalone optimizer.html (static, no Node)
location /apps/optimizer/ {
    alias /srv/optimizer/landing/;
    try_files $uri $uri/ /apps/optimizer/index.html;

    # Cache static assets but not the landing HTML itself
    location ~* \.(css|js|png|jpg|jpeg|webp|svg|ico|woff2?)$ {
        alias /srv/optimizer/landing/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
