name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS .app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow for icon generation
        run: python3 -m pip install --upgrade pip pillow

      - name: Generate placeholder icon
        run: python3 packaging/macos/generate_icon.py

      - name: Build .app bundle
        run: |
          chmod +x packaging/macos/build-app.sh packaging/macos/launcher.sh
          bash packaging/macos/build-app.sh

      - name: Codesign with Developer ID (if available)
        env:
          MAC_DEVELOPER_ID: ${{ secrets.MAC_DEVELOPER_ID }}
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -n "${MAC_DEVELOPER_ID:-}" ] && [ -n "${MAC_CERT_P12_BASE64:-}" ]; then
            echo "Importing Developer ID certificate"
            echo "$MAC_CERT_P12_BASE64" | base64 -d > /tmp/cert.p12
            KEYCHAIN_PASS="$(uuidgen)"
            security create-keychain -p "$KEYCHAIN_PASS" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
            security import /tmp/cert.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" build.keychain
            codesign --force --deep --options runtime \
              --entitlements packaging/macos/entitlements.plist \
              --sign "$MAC_DEVELOPER_ID" \
              "build/CLAUDE.md Optimizer.app"
            rm -f /tmp/cert.p12
          else
            echo "No Developer ID secrets present, using ad-hoc signing"
            codesign --force --deep --sign - "build/CLAUDE.md Optimizer.app"
          fi
          codesign --verify --deep "build/CLAUDE.md Optimizer.app" || true

      - name: Zip .app
        run: |
          cd build
          ditto -c -k --keepParent "CLAUDE.md Optimizer.app" "CLAUDE.md.Optimizer.macOS.zip"
          ls -lh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: build/CLAUDE.md.Optimizer.macOS.zip
          retention-days: 7

  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r packaging/windows/requirements.txt

      - name: Generate placeholder icon
        shell: bash
        run: python packaging/windows/generate_icon.py

      - name: Build .exe with PyInstaller
        shell: bash
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --distpath build/windows \
            --workpath build/windows-work \
            packaging/windows/optimizer.spec

      - name: List output
        shell: bash
        run: |
          ls -la build/windows
          ls -la "build/windows/CLAUDE.md Optimizer.exe" || ls -la build/windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/windows/CLAUDE.md Optimizer.exe
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-zip
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-assets

      - name: Stage extra release assets
        run: |
          cp src/optimizer.html release-assets/optimizer.html
          cp README.md release-assets/README.md
          cp LICENSE release-assets/LICENSE
          if [ -f RELEASE_NOTES_${GITHUB_REF_NAME}.md ]; then
            cp RELEASE_NOTES_${GITHUB_REF_NAME}.md release-assets/RELEASE_NOTES.md
          elif [ -f RELEASE_NOTES_v1.0.0.md ]; then
            cp RELEASE_NOTES_v1.0.0.md release-assets/RELEASE_NOTES.md
          fi
          ls -la release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: release-assets/RELEASE_NOTES.md
          files: |
            release-assets/CLAUDE.md.Optimizer.macOS.zip
            release-assets/CLAUDE.md Optimizer.exe
            release-assets/optimizer.html
            release-assets/README.md
            release-assets/LICENSE
          draft: false
          prerelease: false
